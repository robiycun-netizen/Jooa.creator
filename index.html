<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Jooa's homepage (ㅋㅋ)</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f4f7f6; /* 연한 회색 배경 (예시처럼!) */
            --card-bg: #ffffff;
            --text-primary: #111111;
            --text-secondary: #666666;
            --accent-color: #ffd700; /* 노브 얼굴색 같은 포인트! */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            /* 🍔 프리텐다드 폰트 기본 적용 */
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- 🍕 왼쪽: 프로필 사이드바 (고정) --- */
        .sidebar {
            width: 280px;
            background-color: var(--card-bg);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid rgba(0,0,0,0.05);
            z-index: 10;
        }

        /* 🍩 주아의 마스코트 이미지! ⭐⭐⭐ */
        .profile-img-container {
            width: 150px;
            height: 150px;
            border-radius: 50%; /* 동그랗게! */
            overflow: hidden; /* 동그라미 밖으로 나가는 거 자르기! */
            background-color: #eee;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .profile-img-container img {
            width: 100%; /* 부모(동그라미) 크기에 맞추기! */
            height: 100%;
            object-fit: cover; /* 이미지 비율 안 깨지게! */
        }

        .profile-name {
            /* 🥤 이름 제목에 쌈@뽕 폰트 Montserrat 적용! */
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0;
            text-transform: uppercase;
        }

        .profile-id {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 35px;
        }

        .menu-item {
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            background-color: rgba(0,0,0,0.03);
            border: none;
            border-radius: 12px;
            text-align: left;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
        }

        .menu-item:hover {
            background-color: var(--accent-color);
            color: #111;
        }

        /* --- 🥤 오른쪽: 상세 내용 (스크롤) --- */
        .main-content {
            flex: 1;
            padding: 60px 80px;
            overflow-y: auto;
        }

        /* 상세 내용 카드 디자인 */
        .detail-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 25px;
            color: var(--text-primary);
        }

        .info-grid {
            display: flex;
            gap: 45px;
        }

        .info-item {
            text-align: left;
        }

        .label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .value {
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 10px;
            color: var(--text-primary);
        }

        /* 미션 섹션 (진지함 포인트) */
        .mission-text {
            color: var(--text-secondary);
            font-size: 1.25rem;
            line-height: 1.8;
            font-weight: 500;
        }

        /* 🍩 도넛이 추천하는 부드러운 커서 효과 */
        .cursor-light {
            position: fixed;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(0,0,0,0.02) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="cursor-light" id="cursor"></div>

    <div class="sidebar">
        <div class="profile-img-container">
            <img src="jooa_profile.png" alt="JOOA">
        </div>
        <h1 class="profile-name">JOOA</h1>
        <div class="profile-id">Yeo Jooa (ㅋㅋ)</div>
        <button class="menu-item" onclick="alert('주아의 이야기를 준비 중이야!')">About</button>
        <button class="menu-item" onclick="alert('멋진 영상을 담아볼까?')">Channel</button>
    </div>

    <div class="main-content">
        <div class="detail-card">
            <h2 class="card-title">Profile</h2>
            <div class="info-grid">
                <div class="info-item">
                    <div class="label">Name</div>
                    <div class="value">여주아</div>
                </div>
                <div class="info-item">
                    <div class="label">Age</div>
                    <div class="value">2015년생</div>
                </div>
                <div class="info-item">
                    <div class="label">Identity</div>
                    <div class="value">YouTuber</div>
                </div>
            </div>
        </div>

        <div class="detail-card">
            <h2 class="card-title">Mission</h2>
            <p class="mission-text">
                안녕하세요. 만 11세 크리에이터 여주아입니다. <br>
                저는 단순히 영상을 만드는 것을 넘어, <br>
                콘텐츠의 본질을 파악하고 10만 유튜버가 되는것이 꿈입니다!
            </p>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
